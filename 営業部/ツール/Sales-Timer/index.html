<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1">
    <title>Sales Timer - 着金タイマー</title>
    <meta name="theme-color" content="#10B981">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='0.9em' font-size='90'>💰</text></svg>">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: {
                            light: '#34D399',
                            DEFAULT: '#10B981',
                            dark: '#059669'
                        },
                        accent: '#F59E0B',
                        danger: '#EF4444',
                        warning: '#F97316'
                    },
                    animation: {
                        'slide-up': 'slideUp 0.3s ease-out',
                        'fade-in': 'fadeIn 0.2s ease-out',
                    },
                    keyframes: {
                        slideUp: {
                            '0%': { transform: 'translateY(100%)', opacity: 0 },
                            '100%': { transform: 'translateY(0)', opacity: 1 }
                        },
                        fadeIn: {
                            '0%': { opacity: 0 },
                            '100%': { opacity: 1 }
                        }
                    }
                }
            }
        }
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .mono { font-family: 'JetBrains Mono', monospace; }

        input[type="number"]::-webkit-outer-spin-button,
        input[type="number"]::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
        input[type="number"] { -moz-appearance: textfield; appearance: textfield; }

        .progress-stripe {
            background-image: linear-gradient(
                45deg,
                rgba(255,255,255,0.1) 25%,
                transparent 25%,
                transparent 50%,
                rgba(255,255,255,0.1) 50%,
                rgba(255,255,255,0.1) 75%,
                transparent 75%
            );
            background-size: 20px 20px;
            animation: stripeMove 1s linear infinite;
        }
        @keyframes stripeMove {
            0% { background-position: 0 0; }
            100% { background-position: 20px 0; }
        }

        /* モーダルオーバーレイ */
        .modal-overlay {
            transition: opacity 0.2s ease;
        }
        .modal-overlay.hidden {
            opacity: 0;
            pointer-events: none;
        }
        .modal-content {
            transition: transform 0.3s ease, opacity 0.3s ease;
        }
        .modal-overlay.hidden .modal-content {
            transform: translateY(20px);
            opacity: 0;
        }
    </style>
</head>
<body class="bg-gray-900 text-gray-100 antialiased">
    <div class="container mx-auto px-4 py-5 pb-24 max-w-md">

        <!-- ======== 1. ヘッダー ======== -->
        <header class="flex items-center justify-between mb-6">
            <h1 class="text-xl font-bold text-white flex items-center gap-2">
                <span class="text-primary">SALES</span>
                <span class="mono text-gray-400">TIMER</span>
            </h1>
            <button id="open-settings-btn" class="p-2 rounded-lg hover:bg-gray-800 transition-colors text-gray-400 hover:text-white">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.066 2.573c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.573 1.066c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.066-2.573c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/>
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                </svg>
            </button>
        </header>

        <!-- ======== Addness Philosophy ======== -->
        <div class="mb-4 px-1">
            <p id="philosophy-message" class="text-sm text-center text-gray-400 italic transition-all duration-500 leading-relaxed"></p>
        </div>

        <!-- ======== 2. メイン数字エリア ======== -->
        <section class="bg-gray-800 rounded-2xl border border-gray-700 p-6 mb-4">
            <!-- 達成額 -->
            <div class="text-center mb-4">
                <div class="text-xs text-gray-500 mb-1 uppercase tracking-wider">達成額</div>
                <div id="achieved-amount" class="mono text-4xl font-extrabold text-white tracking-tight">¥0</div>
            </div>

            <!-- プログレスバー -->
            <div class="mb-3">
                <div class="bg-gray-700 rounded-full h-3 overflow-hidden relative">
                    <div class="bg-gradient-to-r from-primary to-primary-light h-full rounded-full transition-all duration-700 ease-out relative overflow-hidden" id="revenue-progress" style="width: 0%">
                        <div class="progress-stripe absolute inset-0"></div>
                    </div>
                </div>
                <div class="flex justify-between items-center mt-1.5">
                    <span id="progress-percent" class="text-sm font-semibold text-primary mono">0.0%</span>
                    <span id="goal-label" class="text-xs text-gray-500">目標: ¥0</span>
                </div>
            </div>
        </section>

        <!-- ======== 3. 2列コンパクトステータス ======== -->
        <section class="grid grid-cols-2 gap-3 mb-4">
            <div class="bg-gray-800 rounded-xl border border-gray-700 p-4 text-center">
                <div class="text-xs text-gray-500 mb-1">成約率（実績）</div>
                <div id="closing-rate-value" class="mono text-2xl font-bold text-accent">--%</div>
            </div>
            <div class="bg-gray-800 rounded-xl border border-gray-700 p-4 text-center">
                <div class="text-xs text-gray-500 mb-1">残り日数</div>
                <div class="flex items-baseline justify-center gap-1">
                    <span id="remaining-days" class="mono text-2xl font-bold text-white">--</span>
                    <span class="text-xs text-gray-500">日</span>
                    <span class="text-gray-600 mx-1">|</span>
                    <span id="needed-contracts" class="mono text-sm font-semibold text-accent">--</span>
                    <span class="text-xs text-gray-500">件必要</span>
                </div>
            </div>
        </section>

        <!-- ======== 4. 着金履歴リスト ======== -->
        <section class="bg-gray-800 rounded-2xl border border-gray-700 p-5">
            <div class="flex items-center justify-between mb-3">
                <h3 class="text-sm font-semibold text-gray-300">着金履歴</h3>
                <span id="record-count" class="text-xs text-gray-500 mono">0件</span>
            </div>
            <div id="records-list" class="space-y-2 max-h-64 overflow-y-auto">
                <p class="text-center text-gray-600 py-6 text-sm">まだ記録がありません</p>
            </div>
        </section>
    </div>

    <!-- ======== 5. フローティングアクションボタン ======== -->
    <button id="open-add-btn" class="fixed bottom-6 right-6 w-14 h-14 bg-primary hover:bg-primary-dark text-white rounded-full shadow-lg shadow-primary/30 flex items-center justify-center transition-all active:scale-90 z-40">
        <svg class="w-7 h-7" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M12 4v16m8-8H4"/>
        </svg>
    </button>

    <!-- ======== 着金追加モーダル ======== -->
    <div id="add-modal" class="modal-overlay hidden fixed inset-0 bg-black/60 z-50 flex items-end justify-center">
        <div class="modal-content bg-gray-800 rounded-t-2xl w-full max-w-md p-6 border-t border-gray-700">
            <div class="flex items-center justify-between mb-5">
                <h2 class="text-lg font-bold text-white">着金を記録</h2>
                <button id="close-add-btn" class="text-gray-500 hover:text-white transition-colors p-1">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
                </button>
            </div>
            <div class="space-y-4">
                <div>
                    <label class="block text-sm text-gray-400 mb-1">着金額（万円）</label>
                    <input type="number" id="record-amount" step="0.1" placeholder="例: 79.8" class="w-full px-4 py-3 border border-gray-600 rounded-lg focus:outline-none focus:ring-2 focus:ring-primary bg-gray-700 text-gray-100 text-lg mono">
                </div>
                <div>
                    <label class="block text-sm text-gray-400 mb-1">メモ（任意）</label>
                    <input type="text" id="record-memo" placeholder="例: 〇〇様 コース契約" class="w-full px-4 py-3 border border-gray-600 rounded-lg focus:outline-none focus:ring-2 focus:ring-primary bg-gray-700 text-gray-100">
                </div>
                <button id="add-record-btn" class="w-full bg-primary hover:bg-primary-dark text-white font-bold py-3.5 rounded-lg transition-all active:scale-[0.98] text-lg">
                    追加
                </button>
            </div>
        </div>
    </div>

    <!-- ======== 6. 設定モーダル ======== -->
    <div id="settings-modal" class="modal-overlay hidden fixed inset-0 bg-black/60 z-50 flex items-end justify-center">
        <div class="modal-content bg-gray-800 rounded-t-2xl w-full max-w-md p-6 border-t border-gray-700 max-h-[85vh] overflow-y-auto">
            <div class="flex items-center justify-between mb-5">
                <h2 class="text-lg font-bold text-white">設定</h2>
                <button id="close-settings-btn" class="text-gray-500 hover:text-white transition-colors p-1">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
                </button>
            </div>

            <div class="space-y-4">
                <!-- 着金目標 -->
                <div>
                    <label class="block text-sm text-gray-400 mb-1">着金目標（万円）</label>
                    <input type="number" id="setting-goal" value="2000" min="1" class="w-full px-4 py-2.5 border border-gray-600 rounded-lg focus:outline-none focus:ring-2 focus:ring-primary bg-gray-700 text-gray-100 mono">
                </div>

                <!-- 商品単価 -->
                <div>
                    <label class="block text-sm text-gray-400 mb-1">商品単価（万円）</label>
                    <input type="number" id="setting-unit-price" value="79.8" min="0.1" step="0.1" class="w-full px-4 py-2.5 border border-gray-600 rounded-lg focus:outline-none focus:ring-2 focus:ring-primary bg-gray-700 text-gray-100 mono">
                </div>

                <!-- 成約率（目標） -->
                <div>
                    <label class="block text-sm text-gray-400 mb-1">成約率 — 目標（%）</label>
                    <input type="number" id="setting-conversion-rate" min="1" max="100" value="50" class="w-full px-4 py-2.5 border border-gray-600 rounded-lg focus:outline-none focus:ring-2 focus:ring-primary bg-gray-700 text-gray-100 mono">
                </div>

                <!-- 成約率（実績） -->
                <div>
                    <label class="block text-sm text-gray-400 mb-1">成約率 — 実績（%）</label>
                    <input type="number" id="setting-closing-rate" min="0" max="100" step="0.1" placeholder="例: 50" class="w-full px-4 py-2.5 border border-gray-600 rounded-lg focus:outline-none focus:ring-2 focus:ring-accent bg-gray-700 text-gray-100 mono">
                </div>

                <!-- 期限 -->
                <div>
                    <label class="block text-sm text-gray-400 mb-1">期限</label>
                    <input type="date" id="setting-deadline" class="w-full px-4 py-2.5 border border-gray-600 rounded-lg focus:outline-none focus:ring-2 focus:ring-primary bg-gray-700 text-gray-100">
                </div>

                <!-- 逆算プレビュー -->
                <div class="bg-gray-900/60 rounded-xl p-4 border border-gray-700 space-y-2 text-sm">
                    <div class="text-xs text-gray-500 uppercase tracking-wider mb-2">逆算プレビュー</div>
                    <div class="flex justify-between text-gray-300">
                        <span>必要成約数</span>
                        <span id="calc-contracts" class="mono font-semibold text-white">--件</span>
                    </div>
                    <div class="flex justify-between text-gray-300">
                        <span>必要商談数</span>
                        <span id="calc-meetings" class="mono font-semibold text-white">--件</span>
                    </div>
                    <div class="flex justify-between text-gray-300">
                        <span>1日あたり商談</span>
                        <span id="calc-daily" class="mono font-semibold text-primary">--件</span>
                    </div>
                    <div class="flex justify-between text-gray-300">
                        <span>1日あたり売上</span>
                        <span id="calc-daily-revenue" class="mono font-semibold text-accent">--万</span>
                    </div>
                </div>

                <!-- 保存ボタン -->
                <button id="save-settings-btn" class="w-full bg-primary hover:bg-primary-dark text-white font-bold py-3 rounded-lg transition-all active:scale-[0.98]">
                    設定を保存
                </button>

                <!-- リセット -->
                <button id="reset-all-btn" class="w-full bg-danger/10 hover:bg-danger/20 text-danger font-medium py-2.5 rounded-lg transition-colors border border-danger/20 text-sm">
                    全データをリセット
                </button>
            </div>
        </div>
    </div>

    <script>
    document.addEventListener('DOMContentLoaded', function() {

        // ==============================
        // データ管理
        // ==============================
        const DEFAULT_SETTINGS = {
            goal: 2000,
            unitPrice: 79.8,
            conversionRate: 50,
            closingRate: 0,
            deadline: '2026-03-31'
        };

        function loadSettings() {
            const saved = localStorage.getItem('salesTimer_settings');
            return saved ? JSON.parse(saved) : { ...DEFAULT_SETTINGS };
        }

        function saveSettings(settings) {
            localStorage.setItem('salesTimer_settings', JSON.stringify(settings));
        }

        function loadRecords() {
            const saved = localStorage.getItem('salesTimer_records');
            return saved ? JSON.parse(saved) : [];
        }

        function saveRecords(records) {
            localStorage.setItem('salesTimer_records', JSON.stringify(records));
        }

        function escapeHTML(str) {
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }

        // ==============================
        // モーダル制御
        // ==============================
        const addModal = document.getElementById('add-modal');
        const settingsModal = document.getElementById('settings-modal');

        function openModal(modal) {
            modal.classList.remove('hidden');
            // 次フレームで表示開始（transition用）
            requestAnimationFrame(() => modal.classList.remove('hidden'));
        }

        function closeModal(modal) {
            modal.classList.add('hidden');
        }

        document.getElementById('open-add-btn').addEventListener('click', () => openModal(addModal));
        document.getElementById('close-add-btn').addEventListener('click', () => closeModal(addModal));
        document.getElementById('open-settings-btn').addEventListener('click', () => {
            applySettingsToForm();
            updateCalcPreview();
            openModal(settingsModal);
        });
        document.getElementById('close-settings-btn').addEventListener('click', () => closeModal(settingsModal));

        // オーバーレイクリックで閉じる
        [addModal, settingsModal].forEach(modal => {
            modal.addEventListener('click', function(e) {
                if (e.target === this) closeModal(this);
            });
        });

        // ==============================
        // 設定フォーム
        // ==============================
        const settingGoal = document.getElementById('setting-goal');
        const settingUnitPrice = document.getElementById('setting-unit-price');
        const settingConversionRate = document.getElementById('setting-conversion-rate');
        const settingClosingRate = document.getElementById('setting-closing-rate');
        const settingDeadline = document.getElementById('setting-deadline');

        function applySettingsToForm() {
            const s = loadSettings();
            settingGoal.value = s.goal;
            settingUnitPrice.value = s.unitPrice;
            settingConversionRate.value = s.conversionRate;
            settingClosingRate.value = s.closingRate || '';
            settingDeadline.value = s.deadline;
        }

        // 設定変更時にプレビュー更新
        [settingGoal, settingUnitPrice, settingConversionRate, settingDeadline].forEach(el => {
            el.addEventListener('input', updateCalcPreview);
        });

        function updateCalcPreview() {
            const goal = parseFloat(settingGoal.value) || 0;
            const unitPrice = parseFloat(settingUnitPrice.value) || 1;
            const rate = parseFloat(settingConversionRate.value) || 1;
            const deadline = new Date(settingDeadline.value);
            const today = new Date();
            today.setHours(0,0,0,0);
            const diffDays = Math.max(1, Math.ceil((deadline - today) / (1000 * 60 * 60 * 24)));

            // 残り金額を考慮
            const records = loadRecords();
            const achieved = records.reduce((sum, r) => sum + r.amount, 0);
            const remainingMan = Math.max(0, goal - achieved / 10000);

            const contracts = Math.ceil(remainingMan / unitPrice);
            const meetings = Math.ceil(contracts / (rate / 100));
            const dailyMeetings = (meetings / diffDays).toFixed(1);
            const dailyRevenue = (remainingMan / diffDays).toFixed(1);

            document.getElementById('calc-contracts').textContent = contracts + '件';
            document.getElementById('calc-meetings').textContent = meetings + '件';
            document.getElementById('calc-daily').textContent = dailyMeetings + '件';
            document.getElementById('calc-daily-revenue').textContent = dailyRevenue + '万';
        }

        document.getElementById('save-settings-btn').addEventListener('click', function() {
            const settings = {
                goal: parseFloat(settingGoal.value) || 100,
                unitPrice: parseFloat(settingUnitPrice.value) || 30,
                conversionRate: parseFloat(settingConversionRate.value) || 20,
                closingRate: parseFloat(settingClosingRate.value) || 0,
                deadline: settingDeadline.value || DEFAULT_SETTINGS.deadline
            };
            saveSettings(settings);
            updateDashboard();

            this.textContent = '保存しました';
            setTimeout(() => {
                this.textContent = '設定を保存';
                closeModal(settingsModal);
            }, 800);
        });

        // ==============================
        // 着金記録
        // ==============================
        document.getElementById('add-record-btn').addEventListener('click', function() {
            const amountInput = document.getElementById('record-amount');
            const memoInput = document.getElementById('record-memo');
            const amountMan = parseFloat(amountInput.value);
            const amount = Math.round(amountMan * 10000);

            if (!amountMan || amountMan <= 0) {
                amountInput.classList.add('border-danger');
                setTimeout(() => amountInput.classList.remove('border-danger'), 1500);
                return;
            }

            const records = loadRecords();
            records.unshift({
                amount: amount,
                memo: memoInput.value || '',
                date: new Date().toISOString()
            });
            saveRecords(records);

            amountInput.value = '';
            memoInput.value = '';

            renderRecords();
            updateDashboard();
            closeModal(addModal);
        });

        function renderRecords() {
            const records = loadRecords();
            const list = document.getElementById('records-list');
            const countEl = document.getElementById('record-count');

            countEl.textContent = records.length + '件';

            if (records.length === 0) {
                list.innerHTML = '<p class="text-center text-gray-600 py-6 text-sm">まだ記録がありません</p>';
                return;
            }

            list.innerHTML = records.map((r, i) => {
                const d = new Date(r.date);
                const dateStr = `${d.getMonth()+1}/${d.getDate()}`;
                const amountMan = (r.amount / 10000).toFixed(1);
                return `
                    <div class="flex items-center justify-between bg-gray-900/40 rounded-lg px-3 py-2.5 border border-gray-700/50">
                        <div class="flex items-center gap-3 min-w-0">
                            <span class="text-xs text-gray-500 shrink-0">${dateStr}</span>
                            <span class="text-primary font-semibold mono text-sm">${amountMan}万</span>
                            ${r.memo ? `<span class="text-xs text-gray-500 truncate">${escapeHTML(r.memo)}</span>` : ''}
                        </div>
                        <button onclick="deleteRecord(${i})" class="text-gray-600 hover:text-danger transition-colors text-xs shrink-0 ml-2 p-1">
                            <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
                        </button>
                    </div>
                `;
            }).join('');
        }

        window.deleteRecord = function(index) {
            const records = loadRecords();
            records.splice(index, 1);
            saveRecords(records);
            renderRecords();
            updateDashboard();
        };

        // ==============================
        // ダッシュボード更新
        // ==============================
        function updateDashboard() {
            const settings = loadSettings();
            const records = loadRecords();

            const goalYen = settings.goal * 10000;
            const unitPriceYen = settings.unitPrice * 10000;
            const rate = settings.conversionRate / 100;

            // 達成額
            const achieved = records.reduce((sum, r) => sum + r.amount, 0);
            const remaining = Math.max(0, goalYen - achieved);
            const progressPercent = goalYen > 0 ? Math.min(100, (achieved / goalYen) * 100) : 0;

            // 残り日数
            const deadline = new Date(settings.deadline);
            const today = new Date();
            today.setHours(0,0,0,0);
            const diffDays = Math.max(0, Math.ceil((deadline - today) / (1000 * 60 * 60 * 24)));

            // 逆算
            const neededContracts = Math.ceil(remaining / unitPriceYen);

            // 達成額
            const achievedEl = document.getElementById('achieved-amount');
            if (remaining <= 0) {
                achievedEl.textContent = '¥' + achieved.toLocaleString();
                achievedEl.classList.add('text-primary');
            } else {
                achievedEl.textContent = '¥' + achieved.toLocaleString();
                achievedEl.classList.remove('text-primary');
            }

            // プログレスバー
            document.getElementById('revenue-progress').style.width = progressPercent + '%';
            document.getElementById('progress-percent').textContent = progressPercent.toFixed(1) + '%';
            document.getElementById('goal-label').textContent = '目標: ¥' + goalYen.toLocaleString();

            // プログレスバーの色
            const progressBar = document.getElementById('revenue-progress');
            if (progressPercent >= 70) {
                progressBar.className = progressBar.className.replace(/from-\S+\s+to-\S+/, 'from-primary to-primary-light');
            } else if (progressPercent >= 30) {
                progressBar.className = progressBar.className.replace(/from-\S+\s+to-\S+/, 'from-accent to-primary');
            } else {
                progressBar.className = progressBar.className.replace(/from-\S+\s+to-\S+/, 'from-danger to-accent');
            }

            // 成約率（実績）
            const cRate = settings.closingRate || 0;
            const crEl = document.getElementById('closing-rate-value');
            crEl.textContent = cRate > 0 ? cRate + '%' : '--%';
            if (cRate >= 50) {
                crEl.className = 'mono text-2xl font-bold text-primary';
            } else if (cRate >= 30) {
                crEl.className = 'mono text-2xl font-bold text-accent';
            } else if (cRate > 0) {
                crEl.className = 'mono text-2xl font-bold text-danger';
            } else {
                crEl.className = 'mono text-2xl font-bold text-accent';
            }

            // 残り日数
            const daysEl = document.getElementById('remaining-days');
            daysEl.textContent = diffDays;
            if (diffDays <= 3) {
                daysEl.classList.add('text-danger');
                daysEl.classList.remove('text-accent', 'text-white');
            } else if (diffDays <= 7) {
                daysEl.classList.add('text-accent');
                daysEl.classList.remove('text-danger', 'text-white');
            } else {
                daysEl.classList.add('text-white');
                daysEl.classList.remove('text-danger', 'text-accent');
            }

            // 必要件数
            document.getElementById('needed-contracts').textContent = neededContracts;
        }

        // ==============================
        // リセット
        // ==============================
        document.getElementById('reset-all-btn').addEventListener('click', function() {
            if (confirm('全てのデータ（設定・着金記録）をリセットしますか？')) {
                localStorage.removeItem('salesTimer_settings');
                localStorage.removeItem('salesTimer_records');
                applySettingsToForm();
                updateCalcPreview();
                renderRecords();
                updateDashboard();
                closeModal(settingsModal);
            }
        });

        // ==============================
        // Addness Philosophy メッセージ
        // ==============================
        const philosophyMessages = [
            // ミッション
            '全人類をWell-beingなGiverにする',
            '教育に革命を起こし、世界を巻き込め。',
            // ビジョン
            '価値提供が、呼吸をするように自然になる世界',
            '朝起きて誰を幸せにするか考えることが当たり前の習慣になる',
            'Giverが最も報われる社会構造を創る',
            // スローガン
            'PLAY YOUR LIFE — 人生をゲームしよう',
            '誰もが価値提供を通じて自分にとって最高な人生を必ず描ける',
            'アドれば、できる',
            // フィロソフィー
            '人の本当の幸福は「与えること」の中にある',
            '善人が報われる世界を、自分たちの手で創る',
            'テクノロジーを、奪い合いのためではなく、与え合いのために使う',
            '「お互い様」の精神を世界規模のシステムにする',
            // バリュー
            '未来と今で、Well-beingする',
            'LTRファースト — 継続する関係が最大資産',
            '当事者領域を、世界一速く良く',
            '視点取得 — 相手の目で見て、心で感じる',
            'Co-Give Super Hard Forever — 共に創る、驚くレベルで、永遠に',
            // コアコンセプト
            '信頼が複利で増え、やがて愛へ昇華する',
            'Giveは無限に続けられ、与えた価値は信頼となって必ず返る',
            // 代表メッセージ
            '人こそが最も大きな可能性',
            '無限の可能性を秘めた「人」を育成し、その能力を最大限に引き出す',
            'できない、をできるようにする',
            // 行動を促す理念応用
            '価値を与えることが最も合理的で、最も楽しく、最も幸福につながる',
            '与えた価値の総量が、あなたの着金額になる',
            '目の前の一人に全力で価値を届けろ。それがアドネスの営業だ',
            'この商談は、相手の人生を変えるチャンスだ',
            '売上は、届けた価値の証明書',
            '今日のGiveが、明日の信頼になり、来月の着金になる',
        ];

        const philosophyEl = document.getElementById('philosophy-message');
        philosophyEl.textContent = philosophyMessages[Math.floor(Math.random() * philosophyMessages.length)];

        setInterval(() => {
            philosophyEl.style.opacity = '0';
            setTimeout(() => {
                philosophyEl.textContent = philosophyMessages[Math.floor(Math.random() * philosophyMessages.length)];
                philosophyEl.style.opacity = '1';
            }, 400);
        }, 12000);

        // ==============================
        // 初期化
        // ==============================
        renderRecords();
        updateDashboard();

        // 1分ごとに更新（日付変更対応）
        setInterval(updateDashboard, 60000);
    });
    </script>
</body>
